<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerij met Lightbox</title>
    <style>
        /* Grid voor de gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1rem;
            overflow: hidden;
            padding: 4%;
            padding-bottom: 1rem;
            justify-content: center; /* Horizontaal centreren */
            align-items: center;
        }

        .gallery-item img {
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            overflow: hidden;
             border-radius: 30px;
    
        }

        .gallery-item img:hover {
            opacity: 0.8;
        }

        /* Lightbox styling */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .lightbox-content {
            max-width: 80%;
            max-height: 80%;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 35px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <!-- Galerij -->
    <div class="gallery">
        <div class="gallery-item">
           <img src="images/Projecten/BUCHAN POSTER 1.png" alt="image" onclick="openLightbox(this)">
        </div>
        <div class="gallery-item">
           <img src="images/Projecten/Buchan Fleece.png" alt="image" onclick="openLightbox(this)">
        </div>
        <div class="gallery-item">
            <img src="images/Projecten/Buchan Shades 2.png" alt="image" onclick="openLightbox(this)">
        </div>
        <div class="gallery-item">
            <img src="images/Projecten/Buchan Summer Sales.png" alt="image" onclick="openLightbox(this)">
        </div>
        <div class="gallery-item">
            <img src="images/Projecten/Black Friday.png" alt="image" onclick="openLightbox(this)">
        </div>
        <div class="gallery-item">
            <img src="images/Projecten/Buchan Back to school sales.png" alt="image" onclick="openLightbox(this)">
        </div>
    </div>

    <script>
        function openLightbox(img) {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            lightbox.style.display = "flex";
            lightboxImg.src = img.src;
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }
    </script>
</body>
</html>
